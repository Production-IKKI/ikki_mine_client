[hud]
	#Horizontal position as fraction of screen width (0 = left, 1 = right)
	# Default: 0.01
	# Range: 0.0 ~ 1.0
	hudXFactor = 0.01
	#Vertical position as fraction of screen height (0 = top, 1 = bottom)
	# Default: 0.01
	# Range: 0.0 ~ 1.0
	hudYFactor = 0.01
	#Show the party HUD on screen
	showPartyHUD = true

[behavior]
	#Fixed height for player rows (prevents jumping when effects appear/disappear)
	staticPlayerRows = false

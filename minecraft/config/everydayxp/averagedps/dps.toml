#HUD Settings
[hud]
	#Scale factor for the Boss DPS overlay (0.25 = 25%, 1.0 = 100%, 2.0 = 200%)
	# Default: 0.4
	# Range: 0.25 ~ 2.0
	hud_scale = 0.3
	#Show DPS during boss fights
	show_bossbar_dps = true
	#X position as percentage of screen width (0.0 to 1.0)
	#0.0 = left edge, 0.5 = center, 1.0 = right edge
	# Default: 0.02
	# Range: 0.0 ~ 1.0
	hud_offset_x = 0.98
	#Y position as percentage of screen height (0.0 to 1.0)
	#0.0 = top edge, 0.5 = center, 1.0 = bottom edge
	# Default: 0.03
	# Range: 0.0 ~ 1.0
	hud_offset_y = 0.33

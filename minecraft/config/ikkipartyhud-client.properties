# IkkiPartyHud client mod config (v1.1.2)
# 変更後はクライアント再起動で反映。

# HUD 位置 (画面比率 0..1)
hudX=0.01
hudY=0.40

# HUD の左右アンカー: left = 左寄せ / right = 右寄せ
# right の場合、hudX は「画面右端からの比率」として扱われる
hudAlign=left

# 描画倍率
hudScale=0.70

# 状態異常アイコン表示
showStatusEffects=true
# 表示件数上限 (0=無制限)。amplifier 高い→残り時間長い順で選抜
effectsLimit=5

# HP バーの色
barColorHigh=0xFF00CC00
barColorMid=0xFFDDBB00
barColorLow=0xFFCC0000

# HP しきい値
barThresholdHigh=0.66
barThresholdLow=0.20

# 状態異常の日本語ラベル辞書 (effectsDict.<effect_key>=<1〜3文字>)
# minecraft: 名前空間は省略可 (例: effectsDict.poison=毒 / effectsDict.minecraft:speed=速)
effectsDict.bad_omen=凶
effectsDict.luck=運
effectsDict.hero_of_the_village=英雄
effectsDict.strength=攻
effectsDict.regeneration=再
effectsDict.dolphins_grace=泳
effectsDict.speed=速
effectsDict.saturation=満
effectsDict.weakness=弱
effectsDict.mining_fatigue=疲
effectsDict.conduit_power=導
effectsDict.instant_damage=傷
effectsDict.darkness=闇
effectsDict.health_boost=増HP
effectsDict.levitation=浮
effectsDict.instant_health=回
effectsDict.night_vision=夜
effectsDict.poison=毒
effectsDict.blindness=盲
effectsDict.absorption=吸
effectsDict.water_breathing=水
effectsDict.slowness=鈍
effectsDict.fire_resistance=火耐
effectsDict.haste=掘
effectsDict.jump_boost=跳
effectsDict.unluck=不運
effectsDict.resistance=耐
effectsDict.nausea=酔
effectsDict.invisibility=透
effectsDict.hunger=飢
effectsDict.slow_falling=遅落
effectsDict.glowing=光

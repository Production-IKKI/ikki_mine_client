[performance]
	#Force use of shared executor for all async tasks, regardless of CPU count
	forceSharedExecutor = false
	#Maximum distance in blocks to render clouds; higher values impact performance
	# Default: 2000
	# Range: > 100
	cloudRenderDistance = 2000

[display]
	#Display values in imperial units (F, mph, inHg) instead of metric (C, m/s, hPa)
	imperialUnits = false

[storms]
	#Global multiplier for storm severity (affects wind speed and precipitation intensity)
	# Default: 3.2
	# Range: 0.5 ~ 8.0
	stormSeverityBooster = 3.2
	#Enable tornado spawning and commands
	enableTornadoes = true
	#Enable random debris spawning during storms
	enableStormDebris = false
	#Maximum number of storm debris items allowed per chunk
	# Default: 10
	# Range: > 0
	maxStormDebrisPerChunk = 10
	#Automatically repair tornado-damaged glass after 5 minutes of no new damage
	autoRepairGlass = true
	#Enable glass damage when a tornado passes over it
	damageGlassOnTornado = true

	[storms.tornado]
		#Seconds between tornado spawn checks
		# Default: 60.0
		# Range: 1.0 ~ 3600.0
		checkIntervalSec = 60.0
		#Base radius around a biome center to spawn a tornado
		# Default: 64.0
		# Range: 1.0 ~ 512.0
		baseSpawnRadiusM = 64.0
		#Minimum surface vs aloft temperature contrast for risk
		# Default: 6.0
		# Range: 0.0 ~ 100.0
		minTempContrastC = 6.0
		#Minimum humidity percentage for risk
		# Default: 65.0
		# Range: 0.0 ~ 100.0
		humidityMinPercent = 65.0
		#Multiplier for pressure gradient contribution
		# Default: 10.0
		# Range: 0.0 ~ 100.0
		pressureGradientGain = 10.0
		#Maximum pressure gradient contribution
		# Default: 3.0
		# Range: 0.0 ~ 100.0
		pressureGradientCap = 3.0
		#Minimum wind speed difference for shear
		# Default: 5.0
		# Range: 0.0 ~ 100.0
		shearMinSpeedDiffMps = 5.0
		#Minimum wind direction difference for shear
		# Default: 45.0
		# Range: 0.0 ~ 360.0
		shearMinDirDiffDeg = 45.0
		#Risk multiplier during storms
		# Default: 1.5
		# Range: 0.0 ~ 10.0
		stormMultiplier = 1.5
		#Minimum computed risk to consider spawning
		# Default: 4.0
		# Range: 0.0 ~ 100.0
		riskMinToConsider = 4.0
		#Base chance per risk point to trigger a tornado
		# Default: 0.05
		# Range: 0.0 ~ 1.0
		baseTriggerChance = 0.05
		#Temperature lapse rate per 100m for aloft proxy
		# Default: 0.65
		# Range: 0.0 ~ 10.0
		lapseRateCPer100m = 0.65
		#Height difference in meters for aloft temperature proxy
		# Default: 1500.0
		# Range: 0.0 ~ 10000.0
		aloftDeltaHM = 1500.0
		#Minimum tornado intensity
		# Default: 0.4
		# Range: 0.0 ~ 1.0
		intensityMin = 0.4
		#Maximum tornado intensity
		# Default: 1.0
		# Range: 0.0 ~ 1.0
		intensityMax = 1.0
		#Cooldown in minutes before a cell can spawn another tornado
		# Default: 20
		# Range: > 0
		cellCooldownMinutes = 20

[wind]
	#Seconds between base wind retarget
	# Default: 60.0
	# Range: 1.0 ~ 600.0
	baseRetargetSec = 60.0
	#Seconds between direction retarget
	# Default: 90.0
	# Range: 1.0 ~ 600.0
	dirRetargetSec = 90.0
	#Average gust duration in seconds
	# Default: 15.0
	# Range: 1.0 ~ 600.0
	gustMeanSec = 15.0
	#Gust decay speed in m/s per second
	# Default: 1.0
	# Range: 0.0 ~ 100.0
	gustDecayMps = 1.0
	#Multiplier for gust speed during storms
	# Default: 2.0
	# Range: 0.0 ~ 10.0
	stormGustMult = 2.0
	#Minimum wind speed to push entities
	# Default: 6.0
	# Range: 0.0 ~ 100.0
	pushThresholdMps = 6.0
	#Wind speed ramp around the threshold for smoothing (m/s)
	# Default: 5.0
	# Range: 0.0 ~ 100.0
	pushRampMps = 5.0
	#Push scale applied to players
	# Default: 0.013333333333
	# Range: 0.0 ~ 1.0
	playerPushScale = 0.013333333333
	#Push scale applied to other entities
	# Default: 0.01
	# Range: 0.0 ~ 1.0
	entityPushScale = 0.01
	#Blend strength for steering wind-bent particles per tick
	# Default: 0.08
	# Range: 0.0 ~ 1.0
	particleBendStrength = 0.08
	#Minimum base wind speed (m/s) before player gusts can occur
	# Default: 11.1
	# Range: 0.0 ~ 100.0
	playerWindThresholdMps = 11.1
	#Maximum per-tick gust impulse for players (blocks per tick)
	# Default: 0.002
	# Range: 0.0 ~ 0.2
	playerMaxGustBpt = 0.002
	#Scale for gust chance once wind exceeds the threshold
	# Default: 0.03
	# Range: 0.0 ~ 1.0
	playerGustChanceScale = 0.03
	#Divider for excess wind when computing gust chance (m/s)
	# Default: 15.0
	# Range: 1.0 ~ 100.0
	playerGustChanceDivider = 15.0
	#Strength scale applied to excess wind for player gusts
	# Default: 0.006666666667
	# Range: 0.0 ~ 1.0
	playerGustStrengthScale = 0.006666666667
	#Minimum gust duration for players (ticks)
	# Default: 10
	# Range: 1 ~ 200
	playerGustDurationMin = 10
	#Maximum gust duration for players (ticks)
	# Default: 40
	# Range: 1 ~ 200
	playerGustDurationMax = 40
	#Angle variance applied to gust direction (degrees)
	# Default: 10.0
	# Range: 0.0 ~ 45.0
	playerGustAngleVarianceDeg = 10.0
	#Wind speed at which extreme gust multipliers kick in (m/s)
	# Default: 30.0
	# Range: 0.0 ~ 100.0
	playerGustExtremeThresholdMps = 30.0
	#Multiplier applied to gust chance in extreme winds
	# Default: 2.5
	# Range: 1.0 ~ 10.0
	playerGustExtremeChanceMult = 2.5
	#Multiplier applied to max gust strength in extreme winds
	# Default: 2.0
	# Range: 1.0 ~ 10.0
	playerGustExtremeStrengthMult = 2.0

[worldEffects]
	#Enable Project Atmosphere world effects (cloud burn suppression, rain extinguish, cauldron filling)
	enabled = true
	#Random sample count per player per tick for weather world effects
	# Default: 12
	# Range: 0 ~ 128
	samplesPerPlayerPerTick = 12
	#Sampling radius in blocks around each player
	# Default: 64
	# Range: 8 ~ 512
	sampleRadiusBlocks = 64
	#Cloud cover threshold above which sun-burning mobs stop igniting
	# Default: 0.75
	# Range: 0.0 ~ 1.0
	cloudBurnPreventionThreshold = 0.75
	#Cloud cover threshold above which burning mobs cool down faster
	# Default: 0.9
	# Range: 0.0 ~ 1.0
	cloudFireDampThreshold = 0.9
	#Extra fire ticks removed per tick when clouds are very dense
	# Default: 4
	# Range: 0 ~ 200
	cloudFireDampTicks = 4
	#Base chance per sample to extinguish fire/campfires when raining (scaled by rain intensity)
	# Default: 0.12
	# Range: 0.0 ~ 1.0
	fireExtinguishBaseChance = 0.12
	#Base chance per sample to fill cauldrons when raining (scaled by rain intensity)
	# Default: 0.06
	# Range: 0.0 ~ 1.0
	cauldronFillBaseChance = 0.06

[telemetry]
	#Enable lightweight telemetry collection for diagnostics
	enableTelemetry = true
	#Number of days to retain exported telemetry archives before pruning
	# Default: 14
	# Range: 0 ~ 365
	telemetryRetentionDays = 14

[debug]
	#Enable debug mode for verbose logging and diagnostics
	debugMode = false

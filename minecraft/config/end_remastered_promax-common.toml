	#格式：属性注册名（例如 minecraft:generic.max_health）。
	#默认包含：最大生命、攻击伤害、护甲、盔甲韧性、移动速度、攻击速度、幸运、击退抗性、跟随范围。
	affected_attributes = ["minecraft:generic.max_health", "minecraft:generic.attack_damage", "minecraft:generic.armor", "minecraft:generic.armor_toughness", "minecraft:generic.movement_speed", "minecraft:generic.attack_speed", "minecraft:generic.luck", "minecraft:generic.knockback_resistance", "minecraft:generic.follow_range"]
	#环境之眼：属性加成比例（异国之眼效果）。默认：0.15（15%）
	# Default: 0.15
	# Range: 0.0 ~ 1.7976931348623157E308
	bonus_percent = 0.15
	#环境之眼：是否免疫火焰伤害（下界之眼效果）。默认：true
	immune_to_fire = true
	#环境之眼：在主世界对燃烧目标的伤害倍率（下界之眼效果）。默认：2.0（2倍）
	# Default: 2.0
	# Range: 1.0 ~ 1.7976931348623157E308
	damage_multiplier_overworld = 2.0
	#环境之眼：在下界对燃烧目标的伤害倍率（下界之眼效果）。默认：3.0（3倍）
	# Default: 3.0
	# Range: 1.0 ~ 1.7976931348623157E308
	damage_multiplier_nether = 3.0
	#环境之眼：攻击时施加缓慢效果的持续时间（寒冰之眼效果）。默认：60
	# Default: 60
	# Range: > 0
	slowness_duration = 60
	#环境之眼：攻击时施加缓慢效果的等级（寒冰之眼效果）。默认：1（II级）
	# Default: 1
	# Range: 0 ~ 255
	slowness_amplifier = 1
	#环境之眼：攻击时施加虚弱效果的持续时间（寒冰之眼效果）。默认：60
	# Default: 60
	# Range: > 0
	weakness_duration = 60
	#环境之眼：攻击时施加虚弱效果的等级（寒冰之眼效果）。默认：1（II级）
	# Default: 1
	# Range: 0 ~ 255
	weakness_amplifier = 1
	#环境之眼：是否免疫冰冻（寒冰之眼效果）。默认：true
	immune_to_freezing = true
	#环境之眼：攻击时无视目标护甲的比例。默认：0.2（20%）
	# Default: 0.2
	# Range: 0.0 ~ 1.0
	armor_penetration = 0.2
